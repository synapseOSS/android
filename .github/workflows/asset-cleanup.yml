name: Asset Cleanup

on:
  workflow_dispatch:
    inputs:
      delete_unused:
        description: 'Delete unused assets'
        required: false
        default: false
        type: boolean
      create_issue:
        description: 'Create GitHub issue with unused assets report'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 2 * * 1'  # Weekly on Monday at 2 AM

jobs:
  cleanup:
    name: Scan Unused Assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build project to generate R.java
        run: ./gradlew assembleDebug

      - name: Detect unused resources with lint
        run: |
          ./gradlew lintDebug
          # Extract unused resources from lint report
          python3 -c "
          import xml.etree.ElementTree as ET
          import os
          
          if os.path.exists('app/build/reports/lint-results-debug.xml'):
              tree = ET.parse('app/build/reports/lint-results-debug.xml')
              unused = []
              for issue in tree.findall('.//issue[@id=\"UnusedResources\"]'):
                  location = issue.find('location')
                  if location is not None:
                      unused.append(location.get('file'))
              
              os.makedirs('docs', exist_ok=True)
              with open('docs/unused.md', 'w') as f:
                  f.write('# Unused Resources Report\n\n')
                  if unused:
                      f.write('## Unused Files:\n')
                      for file in unused:
                          f.write(f'- {file}\n')
                  else:
                      f.write('No unused resources found.\n')
          "

      - name: Delete unused resources
        if: ${{ github.event.inputs.delete_unused == 'true' }}
        run: |
          if [ -f docs/unused.md ]; then
            grep "^- " docs/unused.md | sed 's/^- //' | while read file; do
              if [ -f "$file" ]; then
                echo "Removing: $file"
                rm "$file"
              fi
            done
          fi

      - name: Upload unused assets report
        uses: actions/upload-artifact@v4
        with:
          name: unused-assets-report
          path: docs/unused.md

      - name: Create GitHub issue with report
        if: ${{ github.event.inputs.create_issue == 'true' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT }}
          script: |
            const fs = require('fs');
            const reportPath = 'docs/unused.md';
            
            if (fs.existsSync(reportPath)) {
              const reportContent = fs.readFileSync(reportPath, 'utf8');
              
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Unused Assets Report - ${new Date().toISOString().split('T')[0]}`,
                body: reportContent,
                labels: ['maintenance', 'assets']
              });
            }

      - name: Commit changes
        if: ${{ github.event.inputs.delete_unused == 'true' }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --staged --quiet || git commit -m "chore: remove unused assets [skip ci]"
          git push https://${{ secrets.PAT }}@github.com/${{ github.repository }}.git
