name: Asset Cleanup

on:
  workflow_dispatch:
    inputs:
      delete_unused:
        description: 'Delete unused assets'
        required: false
        default: false
        type: boolean
      create_issue:
        description: 'Create GitHub issue with unused assets report'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 2 * * 1'  # Weekly on Monday at 2 AM

jobs:
  cleanup:
    name: Scan Unused Assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Scan for unused assets
        run: ./scripts/cleanup_assets.sh

      - name: Delete unused assets
        if: ${{ github.event.inputs.delete_unused == 'true' }}
        run: ./scripts/cleanup_assets.sh --delete

      - name: Upload unused assets report
        uses: actions/upload-artifact@v4
        with:
          name: unused-assets-report
          path: docs/unused.md

      - name: Create GitHub issue with report
        if: ${{ github.event.inputs.create_issue == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'docs/unused.md';
            
            if (fs.existsSync(reportPath)) {
              const reportContent = fs.readFileSync(reportPath, 'utf8');
              
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Unused Assets Report - ${new Date().toISOString().split('T')[0]}`,
                body: reportContent,
                labels: ['maintenance', 'assets']
              });
            }

      - name: Commit changes
        if: ${{ github.event.inputs.delete_unused == 'true' }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --staged --quiet || git commit -m "chore: remove unused assets [skip ci]"
          git push
